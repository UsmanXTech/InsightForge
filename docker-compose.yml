version: '3.8'

services:
  db:
    build:
      context: ./database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=insightforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d insightforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - insightforge_net
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/insightforge
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - insightforge_net
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:8080"
    depends_on:
      - backend
    restart: always
    networks:
      - insightforge_net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  insightforge_net:
    driver: bridge

volumes:
  postgres_data:
